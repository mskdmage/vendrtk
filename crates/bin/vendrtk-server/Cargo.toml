[package]
name = "vendrtk-server"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = { version = "0.8.9", features = ["multipart"] }
chrono = { version = "0.4.45", features = ["serde"] }
reqwest = { version = "0.13.4", features = ["multipart"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tokio = { version = "1.52.3", features = ["full"] }
tower-http = { version = "0.7.0", features = ["fs"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
uuid = { version = "1.23.3", features = ["serde", "v4", "v7"] }
vendrtk-core = { path = "../../lib/vendrtk-core" }
vendrtk-storage = { path = "../../lib/vendrtk-storage" }
vendrtk-ocr = { path = "../../lib/vendrtk-ocr" }
vendrtk-parsers = { path = "../../lib/vendrtk-parsers" }
vendrtk-azure = { path = "../../lib/vendrtk-azure" }
thiserror = "2.0.18"